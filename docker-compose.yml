version: "3.8"

services:
  churn-api:
    image: scarlynx/churn-risk-api:latest
    container_name: churn-risk-api
    ports:
      - "8000:8000"
    environment:
      - ENV=production
    command: >
      sh -c "rm -f /app/mlflow.db &&
             python -m mlops.experiment_tracking &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: "no"