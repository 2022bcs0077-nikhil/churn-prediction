name: CI / CD / CT Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Continuous Training: retrain every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      trigger_reason:
        description: "Why are you triggering this?"
        required: false
        default: "manual"

jobs:
  # ─────────────────────────────────────────────
  # CI: Lint + Unit Tests
  # ─────────────────────────────────────────────
  test:
    name: "CI — Test & Lint"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 ml/ app/ mlops/ tests/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503,E402,W292,W293,F401,E127,E128,E302,F541,W291

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ─────────────────────────────────────────────
  # CT: Continuous Training (scheduled + on-demand)
  # ─────────────────────────────────────────────
  train:
    name: "CT — Train & Evaluate"
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[retrain]')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: |
          python ml/train.py \
            --data-dir data \
            --model-dir models \
            --mlflow-uri sqlite:///mlflow.db \
            --experiment churn-prediction-ci

      - name: Evaluate model
        run: |
          python ml/evaluate.py \
            --model-path models/churn_model.pkl \
            --out-dir eval_output \
            --no-mlflow

      - name: Check model quality gate
        run: |
          python - << 'EOF'
          import json, sys
          with open("eval_output/metrics.json") as f:
              m = json.load(f)
          f1, auc = m.get("f1", 0), m.get("roc_auc", 0)
          print(f"F1={f1:.4f}  ROC-AUC={auc:.4f}")
          if f1 < 0.65:
              print(f"❌ F1 {f1:.4f} below quality gate 0.65 — FAILING BUILD")
              sys.exit(1)
          if auc < 0.75:
              print(f"❌ ROC-AUC {auc:.4f} below quality gate 0.75 — FAILING BUILD")
              sys.exit(1)
          print("✅ Quality gate passed")
          EOF

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            models/churn_model.pkl
            models/model_schema.json
            eval_output/

      - name: Upload evaluation plots
        uses: actions/upload-artifact@v4
        with:
          name: eval-plots
          path: eval_output/*.png

  # ─────────────────────────────────────────────
  # CD: Build & Push Docker Image
  # ─────────────────────────────────────────────
  build-and-push:
    name: "CD — Docker Build & Push"
    runs-on: ubuntu-latest
    needs: [test, train]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ML inference image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/churn-ml-api:latest
            ${{ secrets.DOCKER_USERNAME }}/churn-ml-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Drift Detection (daily)
  # ─────────────────────────────────────────────
  drift-check:
    name: "MLOps — Drift Detection"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download current model
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: trained-model
          path: models/

      - name: Run drift detection
        run: |
          python mlops/drift_detection.py --out-dir drift_reports

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_id }}
          path: drift_reports/

      - name: Check for drift alert
        run: |
          if [ -f drift_reports/DRIFT_ALERT.json ]; then
            echo "🚨 DRIFT ALERT detected — check artifact for details"
            cat drift_reports/DRIFT_ALERT.json
            # In production: trigger Slack notification or PagerDuty
          else
            echo "✅ No significant drift detected"
          fi
